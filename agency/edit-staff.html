           <form method="POST" action="../login.html">
                <input type="hidden" name="_token" autocomplete="off">
                <button type="submit" class="signout-btn">
                    <span>Sign out</span>
                    <i class="fa-solid fa-right-from-bracket ms-2"></i>
                </button>
            </form>
        </div>

         <!-- Main Content -->
        <div class="main-content">
      
            <!-- Top Header -->
            <div class="top-header-wrapper">
                <div class="top-header d-flex justify-content-between align-items-center ">
                <div class="hamburger d-flex align-items-center" id="toggleSidebar">
                    <img src="../assets/images/humburger.png" class="img-fluid" alt="">
                    <h2>Staff > Edit Staff</h2>
                </div>

                <!-- User Profile Section -->
                <div class="profile-box d-flex align-items-center">
                    <div class="text-end me-3">
                        <h5 class="profile-title">Agency</h5>
                        <p class="profile-role text-muted">Agency Admin</p>
                    </div>
                </div>
            </div>
            </div>

            <!-- Main Dashboard Content -->
            <div class="dashboard-content w-100">
                <div class="web-list-container">
                    <a href="staff-user.html" class="btn btn-link text-decoration-none">← Back to Staff</a>


                    <form action="" method="post" class="mt-3" autocomplete="off">
                        <input type="hidden" name="_token" value="yxPD97TVvn36tDogKKR5uEV7em83hyYEUXto3Ojw" autocomplete="off">
                        <input type="hidden" name="_method" value="PUT">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input type="text" name="name" class="form-control" value="Staff Test" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" value="staff@one.com" required="">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="phone_number" class="form-control" value="07123456789">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password (leave blank to keep unchanged)</label>
                                <input type="password" name="password" class="form-control box-radius-50">
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active" checked="">
                                    <label class="form-check-label" for="is_active">Active</label>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button class="btn btn-primary line-height-23" type="submit">Update</button>
                            <a href="staff-user.html" class="btn btn-outline-secondary border-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>

    <div class="sidebar-overlay overlay" id="sidebarOverlay"></div>

    <script src="../assets/js/app.js"></script>
