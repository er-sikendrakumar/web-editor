            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var form = document.getElementById("clientCreateForm");
                    var requireSiteSelection = false;
                    var siteCheckboxes = Array.from(document.querySelectorAll('.site-checkbox'));
                    var siteCountEl = document.getElementById('siteSelectionCount');
                    var siteSearch = document.getElementById('siteSearchInput');
                    var selectAllSitesButton = document.getElementById('selectAllSites');
                    var deselectAllSitesButton = document.getElementById('deselectAllSites');
            
                    function updateSiteCount() {
                        var checked = siteCheckboxes.filter(function (checkbox) { return checkbox.checked; }).length;
                        if (siteCountEl) {
                            siteCountEl.textContent = checked > 0 ? checked + ' of ' + siteCheckboxes.length + ' selected' : '';
                        }
                    }
            
                    siteCheckboxes.forEach(function (checkbox) {
                        checkbox.addEventListener('change', function () {
                            checkbox.closest('.site-pick-item').classList.toggle('checked', checkbox.checked);
                            updateSiteCount();
                        });
                    });
            
                    updateSiteCount();
            
                    if (selectAllSitesButton) {
                        selectAllSitesButton.addEventListener('click', function () {
                            siteCheckboxes.forEach(function (checkbox) {
                                var item = checkbox.closest('.site-pick-item');
                                if (!item.style.display || item.style.display !== 'none') {
                                    checkbox.checked = true;
                                    item.classList.add('checked');
                                }
                            });
                            updateSiteCount();
                        });
                    }
            
                    if (deselectAllSitesButton) {
                        deselectAllSitesButton.addEventListener('click', function () {
                            siteCheckboxes.forEach(function (checkbox) {
                                checkbox.checked = false;
                                checkbox.closest('.site-pick-item').classList.remove('checked');
                            });
                            updateSiteCount();
                        });
                    }
            
                    if (siteSearch) {
                        siteSearch.addEventListener('input', function () {
                            var query = this.value.toLowerCase().trim();
                            document.querySelectorAll('.site-pick-item').forEach(function (item) {
                                var text = item.getAttribute('data-search') || '';
                                item.style.display = (!query || text.indexOf(query) !== -1) ? '' : 'none';
                            });
                        });
                    }
            
                    if (form && requireSiteSelection) {
                        form.addEventListener('submit', function (event) {
                            var anyChecked = siteCheckboxes.some(function (checkbox) { return checkbox.checked; });
                            if (!anyChecked) {
                                event.preventDefault();
                                alert('Please select at least one site.');
                            }
                        });
                    }
            
                    var permissionCheckboxes = Array.from(document.querySelectorAll('.perm-checkbox'));
                    var permCountEl = document.getElementById('permSelectionCount');
                    var selectAllPermsButton = document.getElementById('selectAllPerms');
                    var deselectAllPermsButton = document.getElementById('deselectAllPerms');
            
                    function updatePermCount() {
                        var checked = permissionCheckboxes.filter(function (checkbox) { return checkbox.checked; }).length;
                        if (permCountEl) {
                            permCountEl.textContent = checked > 0 ? checked + ' of ' + permissionCheckboxes.length + ' selected' : '';
                        }
                    }
            
                    function toggleItemHighlight(checkbox) {
                        checkbox.closest('.perm-pick-item').classList.toggle('checked', checkbox.checked);
                    }
            
                    if (!permissionCheckboxes.length) {
                        return;
                    }
            
                    var byValue = new Map();
                    var dependencyOf = new Map();
                    var dependentsOf = new Map();
            
                    permissionCheckboxes.forEach(function (checkbox) {
                        byValue.set(checkbox.value, checkbox);
                        var dependency = (checkbox.dataset.dependency || '').trim();
                        if (dependency) {
                            dependencyOf.set(checkbox.value, dependency);
                            if (!dependentsOf.has(dependency)) {
                                dependentsOf.set(dependency, new Set());
                            }
                            dependentsOf.get(dependency).add(checkbox.value);
                        }
                    });
            
                    function checkWithDependencies(value, visited) {
                        visited = visited || new Set();
                        if (visited.has(value)) {
                            return;
                        }
            
                        visited.add(value);
                        var checkbox = byValue.get(value);
            
                        if (checkbox && !checkbox.checked) {
                            checkbox.checked = true;
                            toggleItemHighlight(checkbox);
                        }
            
                        var parent = dependencyOf.get(value);
                        if (parent && byValue.has(parent)) {
                            checkWithDependencies(parent, visited);
                        }
                    }
            
                    function uncheckDependentsRecursively(value, visited) {
                        visited = visited || new Set();
                        if (visited.has(value)) {
                            return;
                        }
            
                        visited.add(value);
                        var children = dependentsOf.get(value);
                        if (!children) {
                            return;
                        }
            
                        children.forEach(function (child) {
                            var childCheckbox = byValue.get(child);
                            if (childCheckbox && childCheckbox.checked) {
                                childCheckbox.checked = false;
                                toggleItemHighlight(childCheckbox);
                                uncheckDependentsRecursively(child, visited);
                            }
                        });
                    }
            
                    permissionCheckboxes.forEach(function (checkbox) {
                        checkbox.addEventListener('change', function () {
                            if (checkbox.checked) {
                                checkWithDependencies(checkbox.value);
                            } else {
                                toggleItemHighlight(checkbox);
                                uncheckDependentsRecursively(checkbox.value);
                            }
                            updatePermCount();
                        });
                    });
            
                    permissionCheckboxes.forEach(function (checkbox) {
                        if (checkbox.checked) {
                            checkWithDependencies(checkbox.value);
                        }
                    });
            
                    updatePermCount();
            
                    if (selectAllPermsButton) {
                        selectAllPermsButton.addEventListener('click', function () {
                            permissionCheckboxes.forEach(function (checkbox) {
                                checkbox.checked = true;
                                toggleItemHighlight(checkbox);
                            });
                            updatePermCount();
                        });
                    }
            
                    if (deselectAllPermsButton) {
                        deselectAllPermsButton.addEventListener('click', function () {
                            permissionCheckboxes.forEach(function (checkbox) {
                                checkbox.checked = false;
                                toggleItemHighlight(checkbox);
                            });
                            updatePermCount();
                        });
                    }
                });
            </script>
