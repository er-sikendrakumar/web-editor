<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-EDITOR</title>
    <link rel="icon" href="../assets/images/favicon.ico" type="image/x-icon">
     <link rel="stylesheet" href="../assets/css/web-editor-all.min.css">
     <link rel="stylesheet" href="../assets/css/web-editor-icon.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <script src="../assets/js/web-editor-jquery.min.js"></script>
</head>
<body>
    <main class="wrapper">
        <div class="sidebar sidebar-main-box" id="sidebar">
            <span class="close-sidebar d-lg-none text-red">×</span>
            <div class="sidebar-content">
                <div class="logo">
                <img src="../assets/images/web-dash-white.png" alt="WEB-EDITOR" class="img-fluid">
                </div>
                <nav class="nav side-nav-box flex-column">
                    <a class="nav-link active" href="index.html">
                        <i class="fa-solid fa-gauge-high me-2"></i>
                        <span>Dashboard</span>
                    </a>

                    <a class="nav-link" href="all-sites.html">
                        <i class="fa-solid fa-globe me-2"></i>
                        <span>All Sites</span>
                    </a>

                    <a class="nav-link" href="support.html">
                        <i class="fa-solid fa-headset me-2"></i>
                        <span>Support</span>
                    </a> 
                    <a class="nav-link" href="setting.html">
                        <i class="fa-solid fa-gear me-2"></i>
                        <span>Settings</span>
                    </a>

                    <a class="nav-link" href="#">
                        <svg xmlns="http://www.w3.org/2000/svg" height="20" width="20" viewBox="0 0 640 640" fill="white">
                          <path d="M160 96C142.3 96 128 110.3 128 128C128 145.7 142.3 160 160 160L288 160L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 160L480 160C497.7 160 512 145.7 512 128C512 110.3 497.7 96 480 96L160 96z"></path>
                        </svg>
                        <span>Toolbox</span>
                    </a>

                </nav>
            </div>
           <form method="POST" action="../login.html">
                <input type="hidden" name="_token" autocomplete="off">
                <button type="submit" class="signout-btn">
                    <span>Sign out</span>
                    <i class="fa-solid fa-right-from-bracket ms-2"></i>
                </button>
            </form>
        </div>

         <!-- Main Content -->
        <div class="main-content">
      
            <!-- Top Header -->
            <div class="top-header-wrapper">
                <div class="top-header d-flex justify-content-between align-items-center ">
                <div class="hamburger d-flex align-items-center" id="toggleSidebar">
                    <img src="../assets/images/humburger.png" class="img-fluid" alt="">
                    <h2>Support > Ticket Details</h2>
                </div>

                <!-- User Profile Section -->
                <div class="profile-box d-flex align-items-center">
                    <div class="text-end me-3">
                        <h5 class="profile-title">Test Client</h5>
                        <p class="profile-role text-muted"> User</p>
                    </div>
                </div>
            </div>
            </div>

            <!-- Main Dashboard Content -->
            <div class="dashboard-content dashsupport-ticket">
                <div class="container-fluid">
                    <!-- Ticket Header -->
                    <div class="card ticket-header-card p-4 mb-4">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <h2 class="mb-3 ticketTitle text-20">sdafd</h2>
                                <div class="mb-2">
                                    <span class="ticket-info-badge">
                                        <i class="fa fa-hashtag"></i> 11
                                    </span>
                                    <span class="ticket-info-badge">
                                        <i class="fa fa-user"></i> Test Client
                                    </span>
                                    <span class="ticket-info-badge">
                                        <i class="fa fa-info-circle"></i>
                                        <span class="badge bg-success"> Open</span>
                                    </span>
                                    <span class="ticket-info-badge">
                                        <i class="fa fa-calendar"></i> 07 May 2026, 14:58
                                    </span>
                                </div>
                                <div class="mt-3">
                                    <strong>Description:</strong>
                                    <p class="mb-0 mt-2">weqrfqewf</p>
                                </div>
                            </div>
                            <div>
                                <a href="support.html" class="btn btn-white" >
                                    <i class="fa fa-arrow-left"></i> Back
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-lg-12">
                            <!-- Tabs -->
                            <div class="card">
                                <div class="card-header bg-white border-bottom-0">
                                    <ul class="nav nav-tabs support-tabs card-header-tabs" role="tablist">
                                        <li class="nav-item" role="presentation">
                                            <button class="nav-link active" id="conversation-tab" data-bs-toggle="tab" data-bs-target="#conversation" type="button" role="tab">
                                                <i class="fa fa-comments"></i> Conversation
                                                <span class="badge bg-primary rounded-pill ms-1 py-6 px-8 line-height-14">0</span>
                                            </button>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <button class="nav-link" id="activity-tab" data-bs-toggle="tab" data-bs-target="#activity" type="button" role="tab">
                                                <i class="fa fa-history"></i> Activity Log
                                            </button>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <button class="nav-link" id="attachments-tab" data-bs-toggle="tab" data-bs-target="#attachments" type="button" role="tab">
                                                <i class="fa fa-paperclip"></i> Attachments
                                                <span class="badge bg-secondary rounded-pill ms-1 py-6 px-8 line-height-14">1</span>
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                                <div class="card-body">
                                    <div class="tab-content">
                                        <!-- Conversation Tab -->
                                        <div class="tab-pane fade show active" id="conversation" role="tabpanel">
                                            <div class="text-center text-muted py-5">
                                                <i class="fa fa-comments fa-3x mb-3"></i>
                                                <p>No replies yet. Be the first to respond!</p>
                                            </div>
                                        </div>

                                        <!-- Activity Tab -->
                                        <div class="tab-pane fade" id="activity" role="tabpanel">
                                            <div class="text-center text-muted py-5">
                                                <i class="fa fa-history fa-3x mb-3"></i>
                                                <p>No activity recorded yet.</p>
                                            </div>
                                        </div>

                                        <!-- Attachments Tab -->
                                        <div class="tab-pane fade" id="attachments" role="tabpanel">
                                            <div class="row">
                                                <div class="col-md-4 mb-3">
                                                    <a href="https://sandbox.kangaroodev.co.uk/kuk_sites/public/storage/support_tickets/11/QZCe3eGJkmb3SkIUSdTUYEluyXNwW4f8ZFH7EYko.png" target="_blank" class="text-decoration-none">
                                                        <div class="attachment-card">
                                                            <img src="https://sandbox.kangaroodev.co.uk/kuk_sites/public/storage/support_tickets/11/QZCe3eGJkmb3SkIUSdTUYEluyXNwW4f8ZFH7EYko.png" class="img-fluid rounded mb-2" alt="Attachment">
                                                            <div class="small text-muted">
                                                                <i class="fa fa-file"></i> lead.png
                                                            </div>
                                                            <div class="small text-muted">12.15 KB</div>
                                                        </div>
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <!-- Ticket Management -->
                            <div class="card mb-3">
                                <div class="card-header text-white">
                                    <h6 class="mb-0"><i class="fa fa-cog"></i> Ticket Management</h6>
                                </div>
                                <div class="card-body">
                                    <form action="" method="POST" class="mb-3">
                                        <input type="hidden" name="_token" value="BlDrOs5NTBsab1G3wlx8wNn7odexyHGMSos2UTNO" autocomplete="off">
                                        <label class="form-label fw-bold">Assign to Agency User</label>
                                        <div class="input-group">
                                            <select name="assigned_to_id" class="form-select me-2">
                                                <option value="">Unassigned</option>
                                                <option value="5">
                                                    agency
                                                </option>
                                                <option value="6">
                                                    Staff Test
                                                </option>
                                            </select>
                                            <button type="submit" class="btn btn-primary btn-md ms-1">
                                                <i class="fa fa-save"></i>
                                            </button>
                                        </div>
                                    </form>

                                    <form action="" method="POST">
                                        <input type="hidden" name="_token" value="BlDrOs5NTBsab1G3wlx8wNn7odexyHGMSos2UTNO" autocomplete="off">
                                        <label class="form-label fw-bold">Admin Response Access</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" name="allow_kuk_response" value="1" onchange="this.form.submit()">
                                            <label class="form-check-label">
                                                Only agency can respond
                                            </label>
                                        </div>
                                        <input type="hidden" name="allow_kuk_response" value="1" id="hidden-toggle">
                                    </form>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">

                            <!-- Update Status -->
                            <div class="card mb-3 text-center">
                                <div class="card-header text-dark">
                                    <h6 class="mb-0"><i class="fa fa-edit"></i> Update Status</h6>
                                </div>
                                <div class="card-body">
                                    <form method="POST" action="">
                                        <input type="hidden" name="_token" value="BlDrOs5NTBsab1G3wlx8wNn7odexyHGMSos2UTNO" autocomplete="off">
                                        <div class="mb-3 ">
                                            <select name="status" class="form-select">
                                                <option value="open" selected>Open</option>
                                                <option value="in_progress">In Progress</option>
                                                <option value="closed">Closed</option>
                                            </select>
                                        </div>
                                        <div class="m-auto">
                                            <button type="submit" class="btn btn-primary btn-md">
                                                <i class="fa fa-save"></i> Update Status
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                        </div>

                        <div class="col-lg-4">
                            <!-- Add Reply -->
                            <div class="card text-center">
                                <div class="card-header text-white">
                                    <h6 class="mb-0"><i class="fa fa-reply"></i> Add Reply</h6>
                                </div>
                                <div class="card-body">
                                    <form method="POST" action="">
                                        <input type="hidden" name="_token" value="BlDrOs5NTBsab1G3wlx8wNn7odexyHGMSos2UTNO" autocomplete="off">
                                        <div class="mb-3">
                                            <textarea name="message" rows="4" class="form-control" placeholder="Type your reply..." required></textarea>
                                        </div>
                                        <div class="m-auto">
                                            <button type="submit" class="btn btn-primary btn-md">
                                                <i class="fa fa-paper-plane"></i> Send Reply
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>

    </main>

    <div class="sidebar-overlay overlay" id="sidebarOverlay"></div>

    <!-- javascript  -->
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/main.js"></script>

</body>
</html>
